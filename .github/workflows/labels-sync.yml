name: labels-sync

on:
  push:
    branches:
      - main
    paths:
      - .github/labels.yml
  workflow_dispatch: ~

permissions:
  contents: read

jobs:
  sync-labels:
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EndBug/label-sync@52074158190acb45f3077f9099fea818aa43f97a # v2.3.3
        with:
          config-file: .github/labels.yml
          token: ${{ secrets.GITHUB_TOKEN }}
