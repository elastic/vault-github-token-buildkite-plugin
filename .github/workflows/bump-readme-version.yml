name: bump-readme-version

on:
  release:
    types:
      - published

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - name: Get new version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
      - name: Update version in README
        run: |
          sed -i "s|elastic/vault-github-token#v[0-9]*\.[0-9]*\.[0-9]*|elastic/vault-github-token#${VERSION}|g" README.md
      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git diff --quiet && echo "No changes to commit" && exit 0
          BRANCH="update-version-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add README.md
          git commit -m "docs: bump version to ${VERSION} in README"
          git push origin "${BRANCH}"
          gh pr create \
            --title "docs: bump version to ${VERSION} in README" \
            --body "Update plugin version reference in README to ${VERSION}." \
            --base main \
            --head "${BRANCH}"
